name: Refresh Prices

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate workflow configuration
        id: preflight
        env:
          CRON_REFRESH_URL: ${{ secrets.CRON_REFRESH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_REFRESH_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Refresh skipped"
              echo
              echo "- Missing \`CRON_REFRESH_URL\` or \`CRON_SECRET\` secret."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Trigger refresh endpoint
        if: steps.preflight.outputs.ready == 'true'
        env:
          CRON_REFRESH_URL: ${{ secrets.CRON_REFRESH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS --retry 3 --retry-all-errors --retry-delay 5 -X POST "$CRON_REFRESH_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"mode":"static","forumId":271,"maxPosts":20}'
