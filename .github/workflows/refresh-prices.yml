name: Refresh Prices

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh endpoint
        env:
          CRON_REFRESH_URL: ${{ secrets.CRON_REFRESH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_REFRESH_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "CRON_REFRESH_URL/CRON_SECRET secrets are required"
            exit 1
          fi

          curl -fsS -X POST "$CRON_REFRESH_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"mode":"static","forumId":271,"maxPosts":20}'
