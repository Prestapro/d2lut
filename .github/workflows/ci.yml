name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Python package tests
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: d2lut
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -v --tb=short -x

  # Next.js web app build
  nextjs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: echo 'DATABASE_URL="file:./dev.db"' > .env

      - name: Setup database
        run: npx prisma generate && npx prisma db push

      - name: Build
        run: npx next build

      - name: Lint
        run: npm run lint || true
