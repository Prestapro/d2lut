name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install base dependencies
        working-directory: d2lut
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,overlay,scraper]"
          pip install pytest pytest-asyncio hypothesis

      - name: Run tests
        working-directory: d2lut
        run: PYTHONPATH=src pytest tests/ -v --tb=short -x --ignore=tests/test_ocr_error_handling.py --ignore=tests/test_overlay_app.py --ignore=tests/test_stash_scan_integration.py --ignore=tests/test_stash_scanner.py --ignore=tests/test_phase1_checkpoint.py --ignore=tests/test_phase1_mvp_checkpoint.py --ignore=tests/test_ocr_parser.py --ignore=tests/test_preservation_properties.py --ignore=tests/test_quality_classification_property.py
