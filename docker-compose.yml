services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: file:./data/cache/d2lut.db
      CRON_SECRET: ${CRON_SECRET}
      NODE_ENV: production
    volumes:
      - d2lut_data:/app/data
    expose:
      - "3000"
    restart: unless-stopped

  live-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - app
    environment:
      API_URL: http://app:3000/api/cron/refresh-prices
      CRON_SECRET: ${CRON_SECRET}
      NODE_ENV: production
      LIVE_SCANNER_INTERVAL_SEC: ${LIVE_SCANNER_INTERVAL_SEC:-1800}
      LIVE_SCANNER_RETRY_MAX: ${LIVE_SCANNER_RETRY_MAX:-3}
      LIVE_SCANNER_RETRY_BACKOFF_SEC: ${LIVE_SCANNER_RETRY_BACKOFF_SEC:-20}
      LIVE_SCANNER_HEARTBEAT_FILE: /tmp/live-scanner.heartbeat
      LIVE_SCANNER_HEALTH_MAX_AGE: ${LIVE_SCANNER_HEALTH_MAX_AGE:-7200}
      LIVE_SCANNER_COMMAND: ${LIVE_SCANNER_COMMAND:-}
    command: ["/bin/sh", "scripts/live_scanner_worker.sh"]
    healthcheck:
      test: ["CMD", "python3", "scripts/live_scanner_healthcheck.py"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 2m
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "81:81"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  d2lut_data:
