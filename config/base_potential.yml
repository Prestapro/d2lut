# Smart Base Potential Configuration
# Maps base item codes to their potential value hints for loot filter display.
# Keys must match the internal D2R json keys.
#
# Fields:
#   uniques: List of notable uniques that can drop from this base
#   runewords: List of runewords that can be made in this base (with socket info)
#   gg_magic: True if this base can roll GG magic affixes worth 50+ fg
#   gg_craft: True if this base is valuable for crafting (hitpower, blood, caster, safety)
#   lld_relevant: True if this base is valuable for LLD (Low Level Dueling)
#   eth_bonus: Bonus value for ethereal versions
#   max_sockets: Maximum socket count for this base type

