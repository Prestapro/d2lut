# LLD (Low Level Dueling) item pricing configuration.
# LLD items have separate market dynamics due to level restrictions.
# 
# LLD Buckets:
#   LLD9  - max level 9 (very niche, rare trades)
#   LLD18 - max level 18 (popular bracket)
#   LLD30 - max level 30 (most active bracket)
#   MLD   - level 31-49 (mid-level duel)
#   HLD   - level 50+ (standard high-level dueling)

# Base LLD pricing multipliers - LLD items often command premium prices
# due to rarity and specific stat requirements
multipliers:
  lld9: 2.0    # Very rare, niche market
  lld18: 1.5   # Popular, active market
  lld30: 1.3   # Most common LLD bracket
  mld: 1.1     # Slight premium for specific items

