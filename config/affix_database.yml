# Complete D2R Magic/Rare Affix Database
# Generated from d2r_maxroll_affixes.csv
# Contains ALL affixes from Arreat Summit / Maxroll
#
# Structure:
# - Name: Affix name as it appears in-game
# - Property: What the affix does
# - AffixLevel: Required affix level for spawn
# - LevelReq: Character level requirement
# - ItemTypes: What items can spawn this affix
# - Group: Affix group (determines exclusivity)
# - BasePrice: FG value for this affix alone
# - Category: magic_only or magic_and_rare

# ===================================
# AFFIX GROUPS (for reference)
# ===================================
# 101 = Defense
# 103 = Minimum Damage
# 104 = Maximum Damage
# 105 = Enhanced Damage
# 107 = Damage Taken to Mana
# 108 = Stamina Regeneration
# 110 = Attack Rating
# 111 = Attack Rating + Enhanced Damage
# 112 = Light Radius
# 113 = Hit Causes Monster to Flee
# 114 = Magic Find
# 115 = Mana
# 116 = All Resistances
# 117 = Cold Resist
# 118 = Fire Resist
# 119 = Lightning Resist
# 120 = Poison Resist
# 122 = Sockets
# 123 = vs Demons
# 125 = +Skills
# 137 = Cold Damage
# 138 = Fire Damage
# 139 = Lightning Damage
# 140 = Poison Damage
# 142 = vs Undead

