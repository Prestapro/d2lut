# Magic/Rare item pricing by affix combinations.
# When a magic item drops, its value is estimated based on:
# 1. Prefix + Suffix combination
# 2. Item level (affects roll ranges)
# 3. Base item type
#
# Format:
#   "<prefix> + <suffix>":
#     base_price: FG value for average roll
#     perfect_price: FG value for perfect roll
#     item_types: []  # Specific bases this applies to (empty = all)
#     min_ilvl: 0     # Minimum item level for this combo to be valuable

