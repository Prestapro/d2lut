# ===================================
# ILVL BONUSES
# ===================================

ilvl_multipliers:
  # Higher ilvl = better roll potential = more value
  90: 1.3    # ilvl 90+ gets bonus for perfect rolls
  85: 1.15
  80: 1.1
  75: 1.05
  50: 1.0    # Base
  30: 0.9    # Lower ilvl
  0: 0.8

# ===================================
# LLD BONUSES
# ===================================

lld_ilvl_tiers:
  # Items with low ilvl are valuable for LLD
  9: 2.0     # LLD9 - max ilvl for level 9 dueling
  18: 1.5    # LLD18
  30: 1.3    # LLD30
