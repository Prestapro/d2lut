# Magic/Rare item pricing by affix combinations.
# Based on real D2R affix names from Arreat Summit / Maxroll
#
# Prefix naming convention:
# - "+2 Class Skills" = {Class}'s (e.g., Necromancer's, Sorceress's)
# - "+3 Skill Tab" = specific prefix (e.g., Venomous for PnB, Golemlord's for Summon)
#
# Suffix naming convention:
# - of the Magus = 20% FCR
# - of Speed = 30% FRW
# - of the Whale = 81-100 Life
# - of Vita = 31-40 Life
# - of Deflecting = +20% Block (shields only)
# - of Atlas = +21-30 Str
# - of Amicae = Damage Reduced by 1-4

