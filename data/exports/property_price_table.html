<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>d2lut property price table - d2r_sc_ladder</title>
  <style>
    :root {
      --bg:#0a1117; --panel:#101922; --line:#223041; --text:#dce7f4; --muted:#92a6be;
      --green:#86efac; --yellow:#fde68a; --red:#fca5a5; --blue:#93c5fd;
    }
    body { margin:0; padding:16px; background: radial-gradient(circle at 10% -10%, #172230, var(--bg)); color:var(--text);
      font: 14px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .wrap { max-width: 1500px; margin: 0 auto; }
    .bar { display:grid; gap:8px; grid-template-columns: 1.2fr auto auto auto auto;
      background: rgba(16,25,34,.9); border:1px solid var(--line); border-radius:12px; padding:10px; position:sticky; top:0; z-index:5; }
    input, select { background:#0c141c; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    .meta { color: var(--muted); margin: 8px 2px 10px; }
    table { width:100%; border-collapse: collapse; background: var(--panel); border:1px solid var(--line); border-radius: 12px; overflow:hidden; }
    thead th { position: sticky; top: 62px; background:#0e1721; border-bottom:1px solid var(--line); color:var(--muted); text-align:left; padding:10px; cursor:pointer; }
    tbody td { padding:8px 10px; border-bottom:1px solid rgba(34,48,65,.55); vertical-align: top; }
    tbody tr:hover { background: rgba(147,197,253,.06); }
    .num { text-align:right; white-space:nowrap; }
    .pill { display:inline-block; padding:2px 7px; border:1px solid var(--line); border-radius:999px; font-size:12px; }
    .conf-high { color: var(--green); }
    .conf-medium { color: var(--yellow); }
    .conf-low { color: var(--red); }
    .muted { color: var(--muted); }
    .sig { color: var(--blue); font-weight: 600; }
    .empty { color: var(--muted); padding:18px 10px; }
    a { color: var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
    @media (max-width: 980px) {
      .bar { grid-template-columns: 1fr 1fr; }
      thead th:nth-child(6), tbody td:nth-child(6),
      thead th:nth-child(9), tbody td:nth-child(9),
      thead th:nth-child(10), tbody td:nth-child(10) { display:none; }
      thead th { top: 108px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <input id="q" type="search" placeholder="Search properties/items (e.g. 300%ED, @45, eth 4os, thresher)">
      <input id="minFg" type="number" min="0" step="1" placeholder="Min median fg">
      <select id="potential">
        <option value="">All potential</option>
        <option value="high">High potential only</option>
      </select>
      <select id="sort">
        <option value="median_desc">Sort: median FG high → low</option>
        <option value="max_desc">Sort: max FG high → low</option>
        <option value="count_desc">Sort: observations high → low</option>
        <option value="samples_desc">Sort: unique items high → low</option>
        <option value="potential_desc">Sort: potential high → low</option>
        <option value="sig_asc">Sort: signature A → Z</option>
      </select>
      <select id="conf">
        <option value="">All confidence</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="meta" id="meta"></div>
    <table>
      <thead>
        <tr>
          <th data-key="signature">Property Combo</th>
          <th data-key="median_fg" class="num">Median FG</th>
          <th data-key="max_fg" class="num">Max FG</th>
          <th data-key="obs_count" class="num">Obs</th>
          <th data-key="variant_count" class="num">Items</th>
          <th data-key="potential_score" class="num">Potential</th>
          <th data-key="top_variants">Top Variants</th>
          <th data-key="signals">Signals</th>
          <th data-key="example_excerpt">Example</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <script>
    const DATA = [{"signature": "thresher", "median_fg": 3100.0, "max_fg": 4000.0, "obs_count": 4, "variant_count": 2, "potential_score": 2, "potential_tags": ["market", "elite_base"], "top_variants": ["base:thresher:eth", "base:thresher:noneth"], "signals": "bin:1 co:3", "confidence": "medium", "example_excerpt": "4000 fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=107988117"}, {"signature": "torch + sorceress_torch + sorceress_skills + 15attr + 10res", "median_fg": 1300.0, "max_fg": 1300.0, "obs_count": 1, "variant_count": 1, "potential_score": 2, "potential_tags": ["market", "torch"], "top_variants": ["unique:hellfire_torch"], "signals": "bin:1", "confidence": "low", "example_excerpt": "Sorc torch storch 15/10 / bin 1300fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108067763"}, {"signature": "torch", "median_fg": 800.0, "max_fg": 2180.0, "obs_count": 32, "variant_count": 1, "potential_score": 2, "potential_tags": ["market", "torch"], "top_variants": ["unique:hellfire_torch"], "signals": "ask:32", "confidence": "high", "example_excerpt": "2x unid torch discount offer: 2180", "last_source_url": ""}, {"signature": "colossus_voulge + eth + 251%ED", "median_fg": 500.0, "max_fg": 500.0, "obs_count": 1, "variant_count": 1, "potential_score": 3, "potential_tags": ["market", "eth_base", "elite_base"], "top_variants": ["base:colossus_voulge:eth"], "signals": "bin:1", "confidence": "low", "example_excerpt": "ETH CV Insight - 16 / 251 ED - 500fg bin", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108036053"}, {"signature": "colossus_voulge", "median_fg": 457.5, "max_fg": 750.0, "obs_count": 6, "variant_count": 1, "potential_score": 2, "potential_tags": ["market", "elite_base"], "top_variants": ["base:colossus_voulge:eth"], "signals": "bin:4 co:2", "confidence": "medium", "example_excerpt": "BIN 750", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108020601"}, {"signature": "132def", "median_fg": 425.0, "max_fg": 425.0, "obs_count": 1, "variant_count": 1, "potential_score": 0, "potential_tags": [], "top_variants": ["set:tal_rashas_adjudication"], "signals": "bin:1", "confidence": "low", "example_excerpt": "Shako 132 def - 425 fg bin", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108069387"}, {"signature": "colossus_voulge + eth + 224%ED", "median_fg": 400.0, "max_fg": 400.0, "obs_count": 1, "variant_count": 1, "potential_score": 2, "potential_tags": ["eth_base", "elite_base"], "top_variants": ["base:colossus_voulge:eth"], "signals": "bin:1", "confidence": "low", "example_excerpt": "ETH CV Insight - 13 / 224 ED - 400fg bin", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108036053"}, {"signature": "thresher + eth + 4os", "median_fg": 400.0, "max_fg": 400.0, "obs_count": 1, "variant_count": 1, "potential_score": 2, "potential_tags": ["rw_base", "elite_base"], "top_variants": ["base:thresher:eth:4os"], "signals": "ask:1", "confidence": "low", "example_excerpt": "4os Eth Thresher 400fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108067640&amp;f=271"}, {"signature": "amulet", "median_fg": 400.0, "max_fg": 400.0, "obs_count": 6, "variant_count": 1, "potential_score": 1, "potential_tags": ["market"], "top_variants": ["set:tal_rashas_adjudication"], "signals": "bin:2 ask:4", "confidence": "medium", "example_excerpt": "tal amu / bin 400fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108067763"}, {"signature": "109def", "median_fg": 375.0, "max_fg": 375.0, "obs_count": 1, "variant_count": 1, "potential_score": 0, "potential_tags": [], "top_variants": ["set:tal_rashas_adjudication"], "signals": "bin:1", "confidence": "low", "example_excerpt": "Shako 109 def - 375 fg bin", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108069387"}, {"signature": "841def", "median_fg": 375.0, "max_fg": 375.0, "obs_count": 1, "variant_count": 1, "potential_score": 0, "potential_tags": [], "top_variants": ["set:tal_rashas_guardianship"], "signals": "ask:1", "confidence": "low", "example_excerpt": "O Tal Armor 841def - 375fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108068941&amp;f=271"}, {"signature": "monarch + 35FCR", "median_fg": 290.0, "max_fg": 290.0, "obs_count": 1, "variant_count": 1, "potential_score": 1, "potential_tags": ["elite_base"], "top_variants": ["base:monarch:noneth"], "signals": "bin:1", "confidence": "low", "example_excerpt": "35 fcr Spirit Monarch / bin 290fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108067763"}, {"signature": "berserker_axe", "median_fg": 250.0, "max_fg": 250.0, "obs_count": 1, "variant_count": 1, "potential_score": 1, "potential_tags": ["elite_base"], "top_variants": ["base:berserker_axe:eth"], "signals": "co:1", "confidence": "low", "example_excerpt": "250fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108036478"}, {"signature": "colossus_voulge + eth", "median_fg": 216.5, "max_fg": 250.0, "obs_count": 6, "variant_count": 1, "potential_score": 2, "potential_tags": ["eth_base", "elite_base"], "top_variants": ["base:colossus_voulge:eth"], "signals": "ask:6", "confidence": "medium", "example_excerpt": "Eth Colossus Voulge = 250 Fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108070480&amp;f=271"}, {"signature": "torch + necromancer_torch + necromancer_skills + 17attr + 16res", "median_fg": 200.0, "max_fg": 200.0, "obs_count": 1, "variant_count": 1, "potential_score": 1, "potential_tags": ["torch"], "top_variants": ["unique:hellfire_torch"], "signals": "ask:1", "confidence": "low", "example_excerpt": "17/16 necro torch offer 200fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108046204"}, {"signature": "mage_plate", "median_fg": 180.0, "max_fg": 850.0, "obs_count": 3, "variant_count": 1, "potential_score": 2, "potential_tags": ["market", "elite_base"], "top_variants": ["base:mage_plate:noneth"], "signals": "bin:1 sold:2", "confidence": "medium", "example_excerpt": "bin 850 edit lowered bin", "last_source_url": "https://forums.d2jsp.org/topic.php?t=107968618"}, {"signature": "torch + barbarian_torch + barbarian_skills", "median_fg": 170.0, "max_fg": 170.0, "obs_count": 1, "variant_count": 1, "potential_score": 1, "potential_tags": ["torch"], "top_variants": ["unique:hellfire_torch"], "signals": "bin:1", "confidence": "low", "example_excerpt": "bin 170 fg barb torch", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108036831"}, {"signature": "torch + druid_torch + druid_skills", "median_fg": 150.0, "max_fg": 150.0, "obs_count": 2, "variant_count": 1, "potential_score": 1, "potential_tags": ["torch"], "top_variants": ["unique:hellfire_torch"], "signals": "ask:2", "confidence": "low", "example_excerpt": "150fg For Druid Torch", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108069587&amp;f=271"}, {"signature": "monarch", "median_fg": 148.0, "max_fg": 300.0, "obs_count": 5, "variant_count": 2, "potential_score": 2, "potential_tags": ["market", "elite_base"], "top_variants": ["base:monarch:noneth", "base:monarch:noneth:3os"], "signals": "bin:1 co:2 ask:2", "confidence": "medium", "example_excerpt": "300fg", "last_source_url": "https://forums.d2jsp.org/topic.php?t=108057432"}];
    const state = { q:"", minFg:null, conf:"", potential:"", sort:"median_desc" };
    const $ = (id) => document.getElementById(id);
    const tbody = $("rows"), meta = $("meta");
    function esc(s) {
      return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    }
    function n(v) { return Math.round(Number(v || 0)); }
    function filterRows(rows) {
      const q = state.q.trim().toLowerCase();
      return rows.filter(r => {
        if (state.minFg != null && Number(r.median_fg) < state.minFg) return false;
        if (state.conf && (r.confidence || "") !== state.conf) return false;
        if (state.potential && Number(r.potential_score || 0) <= 0) return false;
        if (!q) return true;
        const hay = [r.signature, r.top_variants.join(" "), r.example_excerpt, r.signals, (r.potential_tags || []).join(" ")].join(" ").toLowerCase();
        return hay.includes(q);
      });
    }
    function sortRows(rows) {
      return rows.sort((a,b) => {
        switch (state.sort) {
          case "max_desc": return Number(b.max_fg)-Number(a.max_fg) || Number(b.obs_count)-Number(a.obs_count);
          case "count_desc": return Number(b.obs_count)-Number(a.obs_count) || Number(b.median_fg)-Number(a.median_fg);
          case "samples_desc": return Number(b.variant_count)-Number(a.variant_count) || Number(b.median_fg)-Number(a.median_fg);
          case "potential_desc": return Number(b.potential_score)-Number(a.potential_score) || Number(b.max_fg)-Number(a.max_fg) || Number(b.median_fg)-Number(a.median_fg);
          case "sig_asc": return String(a.signature).localeCompare(String(b.signature));
          case "median_desc":
          default: return Number(b.median_fg)-Number(a.median_fg) || Number(b.max_fg)-Number(a.max_fg);
        }
      });
    }
    function render() {
      const rows = sortRows(filterRows(DATA));
      meta.textContent = `Market: d2r_sc_ladder | property combos: ${rows.length} / ${DATA.length}`;
      if (!rows.length) {
        tbody.innerHTML = `<tr><td class="empty" colspan="10">No rows match filters.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => {
        const conf = (r.confidence || "low").toLowerCase();
        const src = r.last_source_url ? `<a href="${esc(r.last_source_url)}" target="_blank" rel="noopener">open</a>` : "";
        return `<tr>
          <td class="sig">${esc(r.signature)}</td>
          <td class="num">${n(r.median_fg)} fg</td>
          <td class="num">${n(r.max_fg)} fg</td>
          <td class="num">${n(r.obs_count)}</td>
          <td class="num">${n(r.variant_count)}</td>
          <td class="num">${n(r.potential_score)} <span class="muted">${esc((r.potential_tags||[]).join(","))}</span></td>
          <td>${esc(r.top_variants.join(" | "))}</td>
          <td class="muted"><span class="pill conf-${conf}">${esc(r.confidence)}</span> ${esc(r.signals)}</td>
          <td class="muted">${esc(r.example_excerpt || "")}</td>
          <td>${src}</td>
        </tr>`;
      }).join("");
    }
    $("q").addEventListener("input", e => { state.q = e.target.value; render(); });
    $("minFg").addEventListener("input", e => { const v = e.target.value.trim(); state.minFg = v ? Number(v) : null; render(); });
    $("potential").addEventListener("change", e => { state.potential = e.target.value; render(); });
    $("sort").addEventListener("change", e => { state.sort = e.target.value; render(); });
    $("conf").addEventListener("change", e => { state.conf = e.target.value; render(); });
    render();
  </script>
</body>
</html>
